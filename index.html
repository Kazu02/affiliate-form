<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">フォーム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    .description {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .step {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .step-number {
      background: #4f46e5;
      color: #fff;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .step-title {
      font-size: 1rem;
      font-weight: 600;
    }
    .field-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
    }
    label .required {
      color: #e53e3e;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="tel"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
      background: #fff;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #4f46e5;
    }
    textarea { resize: vertical; min-height: 80px; }

    /* アフィリエイトリンクボタン */
    .affiliate-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      line-height: 1.4;
    }
    .affiliate-btn:active { transform: scale(0.98); }
    .affiliate-btn.clicked {
      background: #16a34a;
      cursor: default;
    }
    .click-time-display {
      display: none;
      margin-top: 10px;
      padding: 10px 14px;
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #15803d;
    }
    .click-time-display.show { display: block; }

    /* スクショアップロード */
    .upload-area {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-area:hover { border-color: #4f46e5; background: #f5f3ff; }
    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.9rem; color: #666; }
    .upload-text strong { color: #4f46e5; }
    .preview-img {
      display: none;
      max-width: 100%;
      border-radius: 8px;
      margin-top: 12px;
    }
    .preview-img.show { display: block; }

    /* 送信ボタン */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: #e53e3e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #c53030; }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }

    /* 完了画面 */
    .success-screen {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-screen.show { display: block; }
    .success-icon { font-size: 4rem; margin-bottom: 16px; }
    .success-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #15803d; }
    .success-msg { font-size: 0.95rem; color: #555; line-height: 1.6; }

    .form-wrap { display: block; }
    .form-wrap.hidden { display: none; }

    .notice {
      background: #fefce8;
      border: 1px solid #fde047;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.85rem;
      color: #854d0e;
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .sending-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      gap: 16px;
    }
    .sending-overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">

  <!-- フォーム本体 -->
  <div class="form-wrap" id="formWrap">
    <h1 id="form-title"></h1>
    <p class="description" id="form-description"></p>

    <form id="mainForm" novalidate>

      <!-- STEP 1: 基本情報入力 -->
      <div class="step">
        <div class="step-header">
          <div class="step-number">1</div>
          <div class="step-title">基本情報を入力してください</div>
        </div>
        <div id="fields-container"></div>
      </div>

      <!-- STEP 2: アフィリエイトリンク -->
      <div class="step">
        <div class="step-header">
          <div class="step-number">2</div>
          <div class="step-title">下のボタンから作業を行ってください</div>
        </div>
        <div class="notice">
          必ず下のボタンをタップしてリンクを開いてください。<br>
          別のリンクから作業しても記録されません。
        </div>
        <a id="affiliateBtn" class="affiliate-btn" href="#" target="_blank" rel="noopener">
          読み込み中...
        </a>
        <div class="click-time-display" id="clickTimeDisplay">
          ✅ クリック時刻を記録しました：<strong id="clickTimeText"></strong>
        </div>
        <input type="hidden" id="clickTime" name="clickTime">
      </div>

      <!-- STEP 3: スクリーンショット -->
      <div class="step">
        <div class="step-header">
          <div class="step-number">3</div>
          <div class="step-title">作業完了画面のスクショを添付</div>
        </div>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="screenshotInput" accept="image/*" capture="environment">
          <div class="upload-icon">📷</div>
          <div class="upload-text">タップして<strong>スクショを選択</strong><br>または撮影</div>
        </div>
        <img id="previewImg" class="preview-img" alt="プレビュー">
      </div>

      <!-- 送信 -->
      <button type="submit" class="submit-btn" id="submitBtn">送信する</button>

    </form>
  </div>

  <!-- 完了画面 -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✅</div>
    <div class="success-title">送信完了しました</div>
    <div class="success-msg">ご協力ありがとうございました。<br>内容を確認後、ご連絡いたします。</div>
  </div>

</div>

<!-- 送信中オーバーレイ -->
<div class="sending-overlay" id="sendingOverlay">
  <div class="spinner"></div>
  <div>送信中...</div>
</div>

<script src="config.js"></script>
<script>
  // ---- 初期化 ----
  document.getElementById("page-title").textContent = CONFIG.formTitle;
  document.getElementById("form-title").textContent = CONFIG.formTitle;
  document.getElementById("form-description").textContent = CONFIG.formDescription;

  // フォーム項目を動的生成
  const container = document.getElementById("fields-container");
  CONFIG.fields.forEach(field => {
    const group = document.createElement("div");
    group.className = "field-group";

    const label = document.createElement("label");
    label.htmlFor = field.id;
    label.innerHTML = field.label + (field.required ? '<span class="required">*</span>' : '');
    group.appendChild(label);

    let input;
    if (field.type === "textarea") {
      input = document.createElement("textarea");
      input.placeholder = field.placeholder || "";
      input.rows = 3;
    } else if (field.type === "select") {
      input = document.createElement("select");
      (field.options || []).forEach(opt => {
        const o = document.createElement("option");
        o.value = opt; o.textContent = opt;
        input.appendChild(o);
      });
    } else {
      input = document.createElement("input");
      input.type = field.type || "text";
      input.placeholder = field.placeholder || "";
    }
    input.id = field.id;
    input.name = field.id;
    input.required = !!field.required;
    group.appendChild(input);
    container.appendChild(group);
  });

  // ---- アフィリエイトリンク ----
  const affiliateBtn = document.getElementById("affiliateBtn");
  affiliateBtn.href = CONFIG.affiliateUrl;
  affiliateBtn.textContent = CONFIG.affiliateButtonText;

  affiliateBtn.addEventListener("click", function(e) {
    const now = new Date();
    const formatted = formatDatetime(now);
    document.getElementById("clickTime").value = now.toISOString();
    document.getElementById("clickTimeText").textContent = formatted;
    document.getElementById("clickTimeDisplay").classList.add("show");
    affiliateBtn.classList.add("clicked");
    affiliateBtn.textContent = "✅ クリック済み（作業完了後に下へ進む）";
  });

  // ---- スクリーンショットプレビュー ----
  document.getElementById("screenshotInput").addEventListener("change", function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById("previewImg");
      img.src = e.target.result;
      img.classList.add("show");
    };
    reader.readAsDataURL(file);
  });

  // ---- フォーム送信 ----
  document.getElementById("mainForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // バリデーション
    const fields = CONFIG.fields;
    for (const field of fields) {
      if (field.required) {
        const val = document.getElementById(field.id)?.value?.trim();
        if (!val) {
          alert(`「${field.label}」を入力してください。`);
          document.getElementById(field.id)?.focus();
          return;
        }
      }
    }
    if (!document.getElementById("clickTime").value) {
      alert("アフィリエイトリンクをタップしてから送信してください。");
      return;
    }
    const screenshotFile = document.getElementById("screenshotInput").files[0];
    if (!screenshotFile) {
      alert("作業完了画面のスクショを添付してください。");
      return;
    }

    // 送信データ組み立て
    const formData = {};
    fields.forEach(field => {
      formData[field.id] = document.getElementById(field.id)?.value?.trim() || "";
    });
    formData.clickTime = document.getElementById("clickTime").value;
    formData.submitTime = new Date().toISOString();

    // スクショをBase64変換
    const base64 = await fileToBase64(screenshotFile);
    formData.screenshot = base64;
    formData.screenshotName = screenshotFile.name;

    // 送信
    document.getElementById("sendingOverlay").classList.add("show");
    document.getElementById("submitBtn").disabled = true;

    try {
      await fetch(CONFIG.gasUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });
      document.getElementById("sendingOverlay").classList.remove("show");
      document.getElementById("formWrap").classList.add("hidden");
      document.getElementById("successScreen").classList.add("show");
    } catch (err) {
      document.getElementById("sendingOverlay").classList.remove("show");
      document.getElementById("submitBtn").disabled = false;
      alert("送信に失敗しました。通信環境を確認して再度お試しください。");
    }
  });

  // ---- ユーティリティ ----
  function formatDatetime(date) {
    const y = date.getFullYear();
    const mo = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    const h = String(date.getHours()).padStart(2, "0");
    const mi = String(date.getMinutes()).padStart(2, "0");
    const s = String(date.getSeconds()).padStart(2, "0");
    return `${y}/${mo}/${d} ${h}:${mi}:${s}`;
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
