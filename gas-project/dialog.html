<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Sans", "Meiryo", sans-serif; font-size: 14px; padding: 24px; background: #fff; }
  h2 { font-size: 16px; color: #3730a3; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-weight: bold; color: #374151; margin-bottom: 6px; }
  label span { color: #ef4444; margin-left: 2px; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; outline: none; }
  input:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.15); }
  .hint { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  button { padding: 8px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; }
  #btnCancel { background: #f3f4f6; color: #374151; }
  #btnCreate { background: #4f46e5; color: #fff; font-weight: bold; }
  #btnCreate:disabled { background: #a5b4fc; cursor: not-allowed; }
  #msg { margin-top: 12px; font-size: 13px; color: #ef4444; min-height: 18px; }
  #msgOk { color: #16a34a; }
</style>
</head>
<body>
<h2>新規フォーム作成</h2>

<div class="field">
  <label>フォーム記号（シート名・URL用）<span>*</span></label>
  <input id="formCode" type="text" placeholder="例：anken_a">
  <div class="hint">半角英数字とアンダースコアのみ。フォームURLに含まれます。</div>
</div>

<div class="field">
  <label>フォーム名（表示用）</label>
  <input id="formDisplayName" type="text" placeholder="例：○○キャンペーン">
  <div class="hint">日本語OK。報告メッセージや管理シートで使われます。</div>
</div>

<div class="field">
  <label>フォームタイトル<span>*</span></label>
  <input id="formTitle" type="text" placeholder="例：○○キャンペーン申請フォーム">
</div>

<div class="field">
  <label>アフィリエイトURL<span>*</span></label>
  <input id="affiliateUrl" type="url" placeholder="https://...">
</div>

<div class="field">
  <label>代理店コード（任意）</label>
  <input id="agencyCode" type="text" placeholder="例：kn, ab_001">
  <div class="hint">半角英数字とアンダースコアのみ。空欄は自社直営業として扱われます。</div>
</div>

<div id="msg"></div>

<div class="actions">
  <button id="btnCancel" onclick="google.script.host.close()">キャンセル</button>
  <button id="btnCreate" onclick="submit()">作成する</button>
</div>

<script>
function submit() {
  const formCode        = document.getElementById("formCode").value.trim();
  const formDisplayName = document.getElementById("formDisplayName").value.trim();
  const formTitle       = document.getElementById("formTitle").value.trim();
  const affiliateUrl    = document.getElementById("affiliateUrl").value.trim();
  const agencyCode      = document.getElementById("agencyCode").value.trim();
  const msg             = document.getElementById("msg");

  if (!formCode || !formTitle || !affiliateUrl) {
    msg.textContent = "必須項目（*）をすべて入力してください。";
    msg.id = "msg";
    return;
  }
  if (!/^[a-zA-Z0-9_]+$/.test(formCode)) {
    msg.textContent = "フォーム記号は半角英数字とアンダースコアのみ使用できます。";
    msg.id = "msg";
    return;
  }
  if (agencyCode && !/^[a-zA-Z0-9_]+$/.test(agencyCode)) {
    msg.textContent = "代理店コードは半角英数字とアンダースコアのみ使用できます。";
    msg.id = "msg";
    return;
  }

  msg.textContent = "作成中...";
  msg.id = "msg";
  document.getElementById("btnCreate").disabled = true;

  google.script.run
    .withSuccessHandler(function(result) {
      msg.id = "msgOk";
      msg.textContent = "「" + (result.formDisplayName || result.formCode) + "」を作成しました！";
      setTimeout(function() { google.script.host.close(); }, 1500);
    })
    .withFailureHandler(function(err) {
      msg.id = "msg";
      msg.textContent = err.message || "エラーが発生しました。";
      document.getElementById("btnCreate").disabled = false;
    })
    .createFormFromDialog({
      formCode:        formCode,
      formDisplayName: formDisplayName,
      formTitle:       formTitle,
      affiliateUrl:    affiliateUrl,
      agencyCode:      agencyCode
    });
}
</script>
</body>
</html>
